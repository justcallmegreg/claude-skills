name: verify

# Runs on every PR so the required check always reports a status.
# `make verify` is cheap (validates skills.yaml + checks refs exist), so there
# is no harm running it even when no config files changed. A path filter here
# would leave `verify` stuck as "Expected" on PRs that don't touch those files,
# blocking required-check merges.
on:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Rewrite SSH URLs to HTTPS (public repos, no secrets)
        run: git config --global url."https://github.com/".insteadOf "git@github.com:"

      - name: Verify skills.yaml
        run: make verify
